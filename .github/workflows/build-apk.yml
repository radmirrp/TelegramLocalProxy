name: Build APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: kivy/buildozer:latest  # Готовый образ со всем необходимым
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Проверка файлов
        run: |
          echo "=== Содержимое папки ==="
          ls -la
          echo "=== Проверка main.py ==="
          cat main.py || echo "main.py не найден"
      
      - name: Создание простого buildozer.spec
        run: |
          # cat > buildozer.spec << 'EOF'
          echo "=== buildozer.spec создан ==="
          cat buildozer.spec
      
      - name: Сборка APK
        run: |
          buildozer android debug
      
      - name: Загрузка APK
        uses: actions/upload-artifact@v4
        with:
          name: telegram-proxy-apk
          path: bin/*.apk
